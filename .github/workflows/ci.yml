name: basic-ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f README.md
          test -f docs/PRODUCT.md
          test -f app/index.html
          test -f app/styles.css
          test -f app/script.js
